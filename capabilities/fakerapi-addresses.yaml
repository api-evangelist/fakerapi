naftiko: "1.0.0-alpha2"

info:
  label: "FakerAPI — Addresses"
  description: >-
    Addresses — Addresses. 1 operation. Lead operation: List Fake Addresses.
    Self-contained Naftiko capability covering one FakerAPI business surface
    for postal addresses with geographic coordinates.
  tags:
    - FakerAPI
    - Test Data
    - Addresses
  created: "2026-05-30"
  modified: "2026-05-30"

binds: []

capability:

  consumes:
    - type: http
      namespace: "fakerapi-addresses"
      baseUri: "https://fakerapi.it/api/v1"
      description: "FakerAPI — Addresses business capability. No authentication required."
      resources:
        - name: "addresses"
          path: "/addresses"
          operations:
            - name: "listAddresses"
              method: GET
              description: "Return a collection of fake postal addresses with city, country, ZIP, and geocoordinates."
              inputParameters:
                - name: "_quantity"
                  in: query
                  type: integer
                  required: false
                  description: "Number of records to return (1-1000, default 10)."
                - name: "_locale"
                  in: query
                  type: string
                  required: false
                  description: "Locale code (e.g. en_US, fr_FR)."
                - name: "_seed"
                  in: query
                  type: integer
                  required: false
                  description: "Integer seed for deterministic output."
                - name: "country_code"
                  in: query
                  type: string
                  required: false
                  description: "ISO 3166-1 alpha-2 country code filter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "fakerapi-addresses-rest"
      port: 8080
      description: "REST adapter for FakerAPI — Addresses."
      resources:
        - path: "/v1/addresses"
          name: "addresses"
          description: "REST surface for fake addresses."
          operations:
            - method: GET
              name: "listAddresses"
              description: "Return a collection of fake postal addresses."
              call: "fakerapi-addresses.listAddresses"
              with:
                "_quantity": "rest._quantity"
                "_locale": "rest._locale"
                "_seed": "rest._seed"
                "country_code": "rest.country_code"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "fakerapi-addresses-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for FakerAPI — Addresses."
      tools:
        - name: "list-fake-addresses"
          description: "Return a collection of fake postal addresses with geocoordinates."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "fakerapi-addresses.listAddresses"
          with:
            "_quantity": "tools._quantity"
            "_locale": "tools._locale"
            "_seed": "tools._seed"
            "country_code": "tools.country_code"
          outputParameters:
            - type: object
              mapping: "$."
